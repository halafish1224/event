<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>財富護城河決策系統</title>
</head>
<body>
    <header>
        <h1>財富護城河 | 戰略覆盤中心</h1>
    </header>

    <div class="container">
        <div class="master-wisdom" id="wisdom-box">
            <div id="wisdom-content">載入中...</div>
            <span class="master-name" id="wisdom-author"></span>
        </div>

        <div class="card">
            <h2>動態決策日誌</h2>
            <div id="mindset-container"></div>
        </div>
    </div>

    <script>
const wisdomList = [
    { text: "在手拿鐵鎚的人看來，每個問題都像釘子。", author: "查理·蒙格" },
    { text: "複利是世界第八大奇蹟。", author: "查理·蒙格" },
    { text: "如果我知道我會死在哪裡，那我永遠不去那個地方。", author: "查理·蒙格" },
    { text: "擁抱現實，並處理它。", author: "原則 (Ray Dalio)" },
    { text: "投資成功與否，不在於你有多聰明，而在於你能否在別人的恐慌中保持理智。", author: "查理·蒙格" },
    { text: "致富與守富是兩種不同的技術。守富需要謙遜與對風險的恐懼。", author: "致富心態" },
    { text: "痛苦 + 反思 = 進步。", author: "原則 (Ray Dalio)" },
    { text: "不要因為一時的波動而偏離長期的賽道。", author: "致富心態" },
    { text: "最好的決策往往來自於『反向思考』：如果我想失敗，我該怎麼做？然後避免它。", author: "查理·蒙格" },
    { text: "承認自己不知道的事，比裝懂聰明得多。", author: "查理·蒙格" },
    { text: "優質投資就像是等待機會的獵人，而不是不停開槍的射手。", author: "查理·蒙格" },
    { text: "市場不會在意你的情緒，它只會反映你的決策品質。", author: "原則 (Ray Dalio)" },
    { text: "財富是那些你看不到的東西（剩下的錢）。", author: "致富心態" },
    { text: "不要去追逐極端的結果，要尋求穩健的機率。", author: "原則 (Ray Dalio)" },
    { text: "你不需要每一筆都贏，你只需要在贏的時候贏得夠多。", author: "致富心態" },
    { text: "保持簡單，複雜性是風險的溫床。", author: "查理·蒙格" },
    { text: "沒有什麼比『渴望快速致富』更危險的了。", author: "致富心態" },
    { text: "你的時間價值，遠大於你當下為了省錢而浪費的時間。", author: "致富心態" },
    { text: "客觀地看待自己，就像看待一個你要管理的陌生人。", author: "原則 (Ray Dalio)" },
    { text: "歷史不會重複，但會押韻。", author: "查理·蒙格" },
    { text: "投資的邊界比投資的聰明程度更重要。", author: "查理·蒙格" },
    { text: "永遠留有安全邊際，這能讓你避開不可預測的災難。", author: "查理·蒙格" },
    { text: "如果你的投資讓你睡不好覺，那代表你買太多了。", author: "致富心態" },
    { text: "適應性強的人，比最聰明的人活得更久。", author: "原則 (Ray Dalio)" },
    { text: "別人在貪婪時恐懼，別人在恐懼時貪婪。", author: "查理·蒙格" },
    { text: "當你與環境不協調時，調整自己而非強求環境。", author: "原則 (Ray Dalio)" },
    { text: "沒有絕對正確的決策，只有基於當下資訊的最佳機率選擇。", author: "原則 (Ray Dalio)" },
    { text: "財富的價值在於它能為你買回『控制時間的權利』。", author: "致富心態" },
    { text: "不要讓成功沖昏頭，也不要讓失敗徹底擊垮你。", author: "致富心態" },
    { text: "投資的第一原則：不要虧損。", author: "查理·蒙格" },
    { text: "預測未來是不可能的，但我們可以為『未來的不確定性』做好準備。", author: "原則 (Ray Dalio)" },
    { text: "當你面對問題時，首先要問：這是什麼性質的問題？", author: "原則 (Ray Dalio)" },
    { text: "複利最大的特點是：前面慢，後面驚人。", author: "致富心態" },
    { text: "承認錯誤是進化的第一步。", author: "原則 (Ray Dalio)" },
    { text: "專注於你所能控制的事情，忽略那些雜訊。", author: "查理·蒙格" },
    { text: "別把自己看得太重要，市場沒你想像中那麼在乎你。", author: "致富心態" },
    { text: "耐心是投資者最強大的工具。", author: "查理·蒙格" },
    { text: "從錯誤中學習，並將其系統化。", author: "原則 (Ray Dalio)" },
    { text: "你賺到的錢，取決於你的能力與運氣，但守住的錢取決於心態。", author: "致富心態" },
    { text: "簡化決策過程，減少認知負擔。", author: "查理·蒙格" },
    { text: "不要因為別人的賺錢方式快，就拋棄自己穩健的節奏。", author: "致富心態" },
    { text: "面對市場震盪，問問自己：我當初買入的理由還在嗎？", author: "查理·蒙格" },
    { text: "真正的資產是那些能為你持續創造價值的東西，而非價格波動。", author: "原則 (Ray Dalio)" },
    { text: "風險就是：儘管你做了萬全準備，仍有事情會出錯。", author: "致富心態" },
    { text: "別追求完美，追求『足夠好』且『可持續』的系統。", author: "原則 (Ray Dalio)" },
    { text: "多看書，多學習，建立自己的思維模型。", author: "查理·蒙格" },
    { text: "財富的最高境界是『無感』：不需要去證明你有錢。", author: "致富心態" },
    { text: "如果你無法解釋這個投資，就別買它。", author: "查理·蒙格" },
    { text: "當資訊不足時，緩慢決策是美德。", author: "原則 (Ray Dalio)" },
    { text: "不要低估心理因素在投資中的權重。", author: "致富心態" },
    { text: "投資不是為了賺快錢，而是為了讓財富跟隨時間成長。", author: "致富心態" },
    { text: "謙虛與勇氣並存，才是決策者的最佳狀態。", author: "原則 (Ray Dalio)" },
    { text: "把決策寫下來，這能幫你濾除情緒雜訊。", author: "原則 (Ray Dalio)" },
    { text: "長期而言，理性的樂觀主義者總是能贏。", author: "查理·蒙格" },
    { text: "不要讓投資組合變成你的心理負擔。", author: "致富心態" },
    { text: "學會拒絕，是實現目標的關鍵。", author: "原則 (Ray Dalio)" },
    { text: "價格是你付出的，價值是你得到的。", author: "查理·蒙格" },
    { text: "大多數投資人的失敗，源於對『運氣』的錯誤歸因。", author: "致富心態" },
    { text: "不要拿自己的錢去賭博，要拿去參與成長。", author: "查理·蒙格" },
    { text: "保持飢渴，保持愚蠢（Stay hungry, stay foolish）。", author: "查理·蒙格" },
    { text: "環境會變，但人性不會變。", author: "原則 (Ray Dalio)" },
    { text: "投資決策的品質，比結果更重要。", author: "原則 (Ray Dalio)" },
    { text: "適度冒險，但不要過度槓桿。", author: "致富心態" },
    { text: "不要與市場對話，要與數據對話。", author: "原則 (Ray Dalio)" },
    { text: "如果你有錢，記得購買『時間』。", author: "致富心態" },
    { text: "在決策關鍵點上，停下來問自己：這是事實還是偏見？", author: "原則 (Ray Dalio)" },
    { text: "保持簡單，優雅地解決複雜問題。", author: "查理·蒙格" },
    { text: "永遠不要低估簡單原則的威力。", author: "原則 (Ray Dalio)" },
    { text: "別管別人在賺什麼，管好你自己的複利計畫。", author: "致富心態" },
    { text: "失敗不可怕，可怕的是在同一類錯誤上反覆跌倒。", author: "原則 (Ray Dalio)" },
    { text: "投資是關於『機率』的遊戲，而非『預言』的遊戲。", author: "查理·蒙格" },
    { text: "當你感到混亂時，回到你的核心原則。", author: "原則 (Ray Dalio)" },
    { text: "財富是隱形的，因為它是你沒花掉的錢。", author: "致富心態" },
    { text: "別因為過去的成功，就認為未來一定會成功。", author: "原則 (Ray Dalio)" },
    { text: "理性是投資者的護城河。", author: "查理·蒙格" },
    { text: "真正的智慧，是知道自己不知道什麼。", author: "查理·蒙格" },
    { text: "用紀律來對抗人性的弱點。", author: "原則 (Ray Dalio)" },
    { text: "最好的策略是讓你即使在睡夢中也感到安心的策略。", author: "致富心態" },
    { text: "長期來看，你的投資會反映你的為人。", author: "原則 (Ray Dalio)" },
    { text: "把時間花在研究『不變的事物』上，而非追逐短暫的熱點。", author: "查理·蒙格" }
];


        function showRandomWisdom() {
            const item = wisdomList[Math.floor(Math.random() * wisdomList.length)];
            document.getElementById('wisdom-content').innerText = `「${item.text}」`;
            document.getElementById('wisdom-author').innerText = `—— ${item.author}`;
        }
        
        window.onload = () => { showRandomWisdom(); };
    </script>
</body>
</html>
