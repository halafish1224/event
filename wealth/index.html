<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>財富護城河決策系統</title>
</head>
<body>
    <header>
        <h1>財富護城河 | 戰略覆盤中心</h1>
    </header>

    <div class="container">
        <div class="master-wisdom" id="wisdom-box">
            <div id="wisdom-content">載入中...</div>
            <span class="master-name" id="wisdom-author"></span>
        </div>

        <div class="card">
            <h2>動態決策日誌</h2>
            <div id="mindset-container"></div>
        </div>
    </div>

    <script>
        const wisdomList = [
            { text: "在手拿鐵鎚的人看來，每個問題都像釘子。", author: "查理·蒙格" },
            { text: "複利是世界第八大奇蹟。", author: "查理·蒙格" },
            { text: "如果我知道我會死在哪裡，那我永遠不去那個地方。", author: "查理·蒙格" },
            { text: "擁抱現實，並處理它。", author: "原則 (Ray Dalio)" },
            { text: "不要讓情緒左右你的投資決策。", author: "致富心態" }
            // ... 可在此處繼續添加補滿 80 條
        ];

        function showRandomWisdom() {
            const item = wisdomList[Math.floor(Math.random() * wisdomList.length)];
            document.getElementById('wisdom-content').innerText = `「${item.text}」`;
            document.getElementById('wisdom-author').innerText = `—— ${item.author}`;
        }
        
        window.onload = () => { showRandomWisdom(); };
    </script>
</body>
</html>
