<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>蒙格·芒格智慧決策堡壘</title>
    <style>
        :root { --red: #8a1c1c; --gold: #c5a059; --bg: #f4f5f7; }
        body { font-family: 'Helvetica Neue', serif; background: var(--bg); margin: 0; padding: 10px; font-size: 14px; }
        .container { max-width: 700px; margin: auto; }
        .header { background: var(--red); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .wisdom { background: #1a1a1a; color: var(--gold); padding: 15px; margin: 10px 0; border: 1px solid var(--gold); font-size: 0.9rem; font-style: italic; }
        .grid { display: flex; gap: 5px; margin-bottom: 15px; }
        .item { flex: 1; padding: 8px; background: #ddd; text-align: center; font-size: 0.75rem; font-weight: bold; }
        .log { background: white; padding: 15px; border-radius: 4px; border-left: 4px solid var(--gold); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">蒙格·芒格智慧決策堡壘</div>
    <div class="wisdom" id="wisdom">載入智慧中...</div>
    <div class="grid">
        <div class="item">P:戰略</div><div class="item">D:紀律</div><div class="item">C:覆盤</div><div class="item">A:優化</div>
    </div>
    <div class="log" id="log">
        <h2 style="font-size: 1rem; margin-top:0;">戰略覆盤日誌</h2>
        <div id="mindset-container">等待資料串接...</div>
    </div>
</div>
<script>
    const wisdoms = [
        "「如果你想知道如何致富，先研究什麼行為會導致毀滅，然後避免這些行為。」",
        "「在投資中，最大的風險是自己以為能預測市場。」",
        "「複利是世界第八大奇蹟，別讓中途的波動阻礙它。」",
        "「最好的投資是投資自己，讓自己的認知邊界大於市場的恐懼。」",
        "「如果我知道我會在何處死去，那我永遠不去那裡。」",
        "「將投資系統化，是為了避開人性的深淵。」"
    ];
    document.getElementById('wisdom').innerText = wisdoms[Math.floor(Math.random() * wisdoms.length)];

    async function fetchAndDisplayMindset() {
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRD3xLNcLpXzjHmJ1G76pIIuOcpOthPl58JJ5sACgQdLyUoYhvFQtd1Ym8IjSRgKwOzflgp2kGB_Put/pub?gid=528555821&single=true&output=csv';
        const container = document.getElementById('mindset-container');
        try {
            const res = await fetch(url);
            const data = await res.text();
            const rows = data.split('\n').slice(1).reverse();
            container.innerHTML = rows.map(r => {
                const col = r.split(',');
                return `<div style="margin-bottom:10px; border-bottom:1px solid #eee;">
                    <small style="color:#888;">${col[0]}</small>
                    <div style="color:var(--red); font-weight:bold;">${col[1]}</div>
                    <p style="font-size:0.9rem;">${col[2]}</p>
                </div>`;
            }).join('');
        } catch(e) { container.innerHTML = "資料讀取錯誤，請確認發布設定。"; }
    }
    window.onload = fetchAndDisplayMindset;
</script>
</body>
</html>
