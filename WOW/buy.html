<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>東京冬日紀行 2026 | 願望清單版</title>
    <style>
        /* ... 此處請沿用你原始語法中的 CSS 設定 ... */
        .buy-gallery-img { width: 100%; aspect-ratio: 1/1; object-fit: contain; cursor: zoom-in; }
        .is-checked { opacity: 0.4; filter: grayscale(1); }
    </style>
</head>
<body>

<div class="buy-gallery-card">
    <div class="buy-gallery-head">
        <div class="buy-gallery-title">🛍️ 許願品項即時總覽</div>
        <button class="buy-gallery-refresh" onclick="refreshBuyGallery()">🔄 同步最新</button>
    </div>
    <div id="buy-gallery-list" class="buy-gallery-grid">
        <div class="buy-gallery-status">🧳 正在掃描雲端許願清單...</div>
    </div>
</div>

<script>
    // 你的試算表 CSV 連結
    const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRD3xLNcLpXzjHmJ1G76pIIuOcpOthPl58JJ5sACgQdLyUoYhvFQtd1Ym8IjSRgKwOzflgp2kGB_Put/pub?gid=215819179&single=true&output=csv';

    /**
     * 智能提取 Cloudinary 正確網址
     * 專門處理：dshfj9acehttps://res.cloudinary.com/... 這種黏在一起的字串
     */
    function extractCloudinaryUrl(str) {
        if (!str) return "";
        // 正則解釋：尋找 res.cloudinary.com 開頭到 .jpg/.png/.webp 結尾的完整路徑
        const match = str.match(/(https:\/\/res\.cloudinary\.com\/dshfj9ace\/image\/upload\/[^\s\?]+\.(?:jpg|jpeg|png|webp))/i);
        return match ? match[0] : str; // 若解析失敗則回傳原始值
    }

    async function refreshBuyGallery() {
        const container = document.getElementById('buy-gallery-list');
        container.innerHTML = '<div class="buy-gallery-status">讀取中...</div>';

        try {
            const response = await fetch(GOOGLE_SHEET_CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').map(r => r.split(','));
            const headers = rows[0];

            // 自動偵測欄位位置
            const nameIdx = headers.findIndex(h => /名稱|品項|商品/.test(h));
            const imgIdx = headers.findIndex(h => /網址|圖|照片/.test(h));
            const noteIdx = headers.findIndex(h => /備註|說明/.test(h));

            let html = '';
            for (let i = 1; i < rows.length; i++) {
                if (rows[i].length < 2) continue;
                
                const name = rows[i][nameIdx] || "未命名品項";
                const rawImg = rows[i][imgIdx] || "";
                const note = rows[i][noteIdx] || "";
                
                // 執行清洗
                const cleanImg = extractCloudinaryUrl(rawImg);
                
                html += `
                    <div class="buy-gallery-item" id="wish-item-${i}">
                        <img src="${cleanImg}" class="buy-gallery-img" 
                             onerror="this.src='https://via.placeholder.com/150?text=No+Image'"
                             onclick="openImageModal(this.src)">
                        <div class="buy-gallery-name">${name}</div>
                        <div style="font-size:0.8rem; color:#666;">${note}</div>
                        <label>
                            <input type="checkbox" onchange="toggleWishChecked(${i}, this)"> 已買到
                        </label>
                    </div>
                `;
            }
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = "讀取失敗，請檢查網路連線。";
        }
    }

    function toggleWishChecked(id, checkbox) {
        document.getElementById(`wish-item-${id}`).classList.toggle('is-checked', checkbox.checked);
        localStorage.setItem(`wish_checked_${id}`, checkbox.checked);
    }

    // 啟動
    refreshBuyGallery();
</script>

</body>
</html>
